<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxCraft 2.0 PRO — Enterprise Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════════════════
           ОСНОВНОЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ (ADMIN PANEL)
        ══════════════════════════════════════════════════════ */
        :root {
            --accent: #6366f1; --accent-hover: #4f46e5;
            --bg: #0f172a; --card: #1e293b; --dark: #020617;
            --text: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; min-height: 95vh; display: flex; flex-direction: column; }

        /* HEADER & LOGO */
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { display: flex; align-items: center; gap: 15px; font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .logo-box { width: 45px; height: 45px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--success); text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* FORM GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: white; font-family: inherit; transition: 0.2s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        /* TABS */
        .tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
        .tab { padding: 12px 5px; cursor: pointer; color: var(--text-muted); font-weight: 700; font-size: 14px; position: relative; transition: 0.3s; }
        .tab.active { color: var(--accent); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 3px; }

        /* SPEAKERS MANAGER */
        .spk-card { display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .spk-avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; }

        /* TIMECODES */
        .tc-item { display: flex; gap: 20px; padding: 15px; border-radius: 12px; transition: 0.2s; cursor: pointer; border: 1px solid transparent; }
        .tc-item:hover { background: rgba(255,255,255,0.03); border-color: var(--border); }
        .tc-time { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 700; background: rgba(99, 102, 241, 0.1); padding: 4px 10px; border-radius: 8px; height: fit-content; font-size: 14px; }
        .tc-spk { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* BUTTONS */
        .btn { padding: 15px 30px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--accent); color: white; width: 100%; font-size: 16px; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }

        /* FOOTER */
        footer { margin-top: auto; padding: 30px 0; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 40px; }
        .f-link { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .f-link:hover { color: var(--accent); }

        #mediaPlayer { width: 100%; border-radius: 15px; margin-bottom: 25px; display: none; background: #000; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><div class="logo-box">V</div> VoxCraft 2.0</div>
        <div class="status-badge"><div class="dot"></div> Admin Mode: Olga_lav</div>
    </header>

    <div class="card">
        <div class="grid">
            <div>
                <label>Прямая ссылка на файл (MP3/MP4)</label>
                <input type="text" id="mediaUrl" placeholder="https://storage.yandex.net/video.mp4">
            </div>
            <div>
                <label>Название проекта</label>
                <input type="text" id="projTitle" value="Технический разбор Prodamus.XL">
            </div>
            <div>
                <label>API Провайдер</label>
                <select id="provider">
                    <option value="deepgram">Deepgram AI</option>
                    <option value="assembly">AssemblyAI</option>
                    <option value="gladia">Gladia Engine</option>
                </select>
            </div>
        </div>
        <button class="btn btn-primary" onclick="initApp()">🚀 Обработать медиа и создать виджет</button>
    </div>

    <div id="workArea" class="card" style="display: none;">
        <video id="mediaPlayer" controls></video>

        <nav class="tabs">
            <div class="tab active" onclick="switchTab(this, 'tab-spk')">Спикеры</div>
            <div class="tab" onclick="switchTab(this, 'tab-tcd')">Таймкоды</div>
            <div class="tab" onclick="switchTab(this, 'tab-txt')">Полный текст</div>
            <div class="tab" onclick="switchTab(this, 'tab-smr')">Саммари</div>
            <div class="tab" onclick="switchTab(this, 'tab-wdg')">Виджет проекта</div>
        </nav>

        <div id="tab-spk" class="tab-content">
            <p style="margin-bottom: 20px; font-size: 14px; color: var(--text-muted);">Имена спикеров обновятся во всех таймкодах и виджете автоматически:</p>
            <div id="speakersContainer"></div>
        </div>

        <div id="tab-tcd" class="tab-content" style="display: none;">
            <div id="timecodesContainer"></div>
        </div>

        <div id="tab-txt" class="tab-content" style="display: none;">
            <textarea id="rawTextExport" rows="15" readonly></textarea>
        </div>

        <div id="tab-smr" class="tab-content" style="display: none;">
            <textarea id="summaryAi" rows="10" placeholder="ИИ формирует ключевые смыслы..."></textarea>
        </div>

        <div id="tab-wdg" class="tab-content" style="display: none;">
            <div class="grid">
                <div>
                    <label>Готовый HTML-код виджета</label>
                    <textarea id="widgetCodeArea" rows="10" readonly style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--success);"></textarea>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="width: auto;" onclick="copyWidget()">📋 Копировать код</button>
                <button class="btn btn-success" onclick="downloadWidget()">⬇ Скачать файл .html</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://deepgram.com" target="_blank" class="f-link">Deepgram</a>
        <a href="https://assemblyai.com" target="_blank" class="f-link">AssemblyAI</a>
        <a href="https://gladia.io" target="_blank" class="f-link">Gladia</a>
        <a href="https://prodamus.ru" target="_blank" class="f-link">Prodamus Support</a>
    </footer>
</div>

<script>
/* ══════════════════════════════════════════════════════
   ЛОГИКА ПРИЛОЖЕНИЯ
══════════════════════════════════════════════════════ */

let currentTranscription = [
    { start: 0, spkId: 0, text: "Приветствую! Сегодня мы разберем фатальные ошибки в настройке GetCourse." },
    { start: 24.5, spkId: 1, text: "Ольга, привет. Да, самая частая проблема — это неверные вебхуки от Prodamus." },
    { start: 58.2, spkId: 0, text: "Именно. Сейчас я покажу код, который решает эту проблему раз и навсегда." }
];

let speakerMap = { 0: "Ольга техспец", 1: "Техподдержка" };

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
}

function initApp() {
    const url = document.getElementById('mediaUrl').value;
    const player = document.getElementById('mediaPlayer');
    if(url) {
        player.src = url;
        player.style.display = 'block';
    }
    document.getElementById('workArea').style.display = 'block';
    
    renderSpeakers();
    renderTimecodes();
    updateWidget();
}

// УПРАВЛЕНИЕ СПИКЕРАМИ
function renderSpeakers() {
    const cont = document.getElementById('speakersContainer');
    cont.innerHTML = '';
    Object.keys(speakerMap).forEach(id => {
        const div = document.createElement('div');
        div.className = 'spk-card';
        div.innerHTML = `
            <div class="spk-avatar">${parseInt(id) + 1}</div>
            <div style="flex:1">
                <label>Имя спикера (ID: ${id})</label>
                <input type="text" value="${speakerMap[id]}" oninput="renameSpeaker(${id}, this.value)">
            </div>
        `;
        cont.appendChild(div);
    });
}

function renameSpeaker(id, name) {
    speakerMap[id] = name;
    renderTimecodes(); // Обновляем таймкоды при переименовании
    updateWidget();    // Обновляем код виджета
}

// УПРАВЛЕНИЕ ТАЙМКОДАМИ
function renderTimecodes() {
    const cont = document.getElementById('timecodesContainer');
    const txtArea = document.getElementById('rawTextExport');
    cont.innerHTML = '';
    let fullText = "";

    currentTranscription.forEach(item => {
        const name = speakerMap[item.spkId];
        fullText += `[${formatTime(item.start)}] ${name}: ${item.text}\n\n`;
        
        const div = document.createElement('div');
        div.className = 'tc-item';
        div.onclick = () => {
            const p = document.getElementById('mediaPlayer');
            p.currentTime = item.start;
            p.play();
        };
        div.innerHTML = `
            <span class="tc-time">${formatTime(item.start)}</span>
            <div style="flex:1">
                <span class="tc-spk">${name}</span>
                <p>${item.text}</p>
            </div>
        `;
        cont.appendChild(div);
    });
    txtArea.value = fullText;
}

function switchTab(el, tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tabId).style.display = 'block';
}

// ГЕНЕРАЦИЯ ВИДЖЕТА С ПЕРЕМЕННЫМИ ДЛЯ ДИЗАЙНА
function updateWidget() {
    const title = document.getElementById('projTitle').value;
    const url = document.getElementById('mediaUrl').value || '#';
    const isVid = url.toLowerCase().includes('mp4') || url.toLowerCase().includes('mov');
    
    const rows = currentTranscription.map(d => `
        <div class="vx-row" onclick="vxJ(this, ${d.start})">
            <span class="vx-tm">${formatTime(d.start)}</span>
            <div class="vx-c">
                <span class="vx-s">${speakerMap[d.spkId]}</span>
                <p class="vx-t">${d.text}</p>
            </div>
        </div>`).join('');

    const widget = `
<div id="vx-w-root">
    <style>
        #vx-w-root {
            /* 🎨 ПЕРЕМЕННЫЕ ДЛЯ ТЕХСПЕЦА: НАСТРОЙ ДИЗАЙН ТУТ */
            --primary: #6366f1;           /* Акцентный цвет */
            --bg-body: #ffffff;           /* Фон виджета */
            --text-main: #1e293b;         /* Основной текст */
            --text-spk: #94a3b8;          /* Цвет имени спикера */
            --bg-hover: #f1f5f9;          /* Наведение на строку */
            --border-color: #e2e8f0;      /* Границы */
            --radius: 12px;               /* Скругление */
            
            font-family: 'Segoe UI', Tahoma, sans-serif;
            max-width: 100%; background: var(--bg-body);
            border: 1px solid var(--border-color); border-radius: var(--radius);
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin: 20px 0;
        }
        .vx-h { padding: 15px 20px; font-weight: bold; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-size: 16px; }
        .vx-m { width: 100%; display: block; background: #000; border-bottom: 1px solid var(--border-color); }
        .vx-b { max-height: 400px; overflow-y: auto; padding: 10px; }
        .vx-row { display: flex; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
        .vx-row:hover { background: var(--bg-hover); }
        .vx-tm { font-family: monospace; font-weight: bold; color: var(--primary); background: rgba(99, 102, 241, 0.1); padding: 2px 6px; border-radius: 5px; font-size: 13px; height: fit-content; }
        .vx-s { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--text-spk); display: block; margin-bottom: 2px; }
        .vx-t { margin: 0; color: var(--text-main); font-size: 14px; line-height: 1.4; }
    </style>

    <div class="vx-h">${title}</div>
    <${isVid ? 'video' : 'audio'} src="${url}" controls class="vx-m"></${isVid ? 'video' : 'audio'}>
    <div class="vx-b">${rows}</div>

    <script>
        function vxJ(el, s) {
            const p = el.closest('#vx-w-root').querySelector('.vx-m');
            p.currentTime = s; p.play();
        }
    <\/script>
</div>`.trim();

    document.getElementById('widgetCodeArea').value = widget;
}

function copyWidget() {
    const copyText = document.getElementById("widgetCodeArea");
    copyText.select();
    document.execCommand("copy");
    alert("Код виджета скопирован!");
}

function downloadWidget() {
    const code = document.getElementById('widgetCodeArea').value;
    const blob = new Blob([code], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'voxcraft_widget.html';
    a.click();
}
</script>

</body>
</html>
